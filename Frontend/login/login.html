<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="../env.js"></script>
    <script src="../header/js/header.js"></script>
    <script src="./js/login.js"></script>
    <link rel="stylesheet" href="../header/css/header.css">
    <link rel="stylesheet" href="../login/css/login.css">
</head>
<body>
    <header></header>
    <main>
        <img src="./img/titleImage-removebg-preview.png" alt="">
        <form id="loginForm">
            <h1>Enter your credentials</h1>
            <div class="row">
                <label for="emailUser">Email:</label>
                <input type="email" id="emailUser" name="email" required>
            </div>
            <div class="row">
                <span><label for="passwordUser">Password:</label></span>
                <span><input type="password" id="passwordUser" name="password" minlength="6" required></span>
            </div>
            <p id="error"></p>
            <input type="submit" value="login">
            <p>Not registered? Create an account <a href="../register/register.html">here</a></p>
        </form>
    </main>
<script src="./js/account.js" ></script>
</body>
</html>
